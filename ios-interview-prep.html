<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Staff iOS Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #ff6b35;
    --accent2: #00d4ff;
    --accent3: #a855f7;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --green: #22c55e;
    --card: #14141f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
  }

  .tag {
    display: inline-block;
    background: rgba(255,107,53,0.12);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 4px 12px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 12px;
    letter-spacing: 0.05em;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent2);
  }

  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Category tabs */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 24px 0 20px;
    flex-wrap: wrap;
  }

  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--border);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }

  /* Q&A Cards */
  .qa-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }

  .qa-card {
    background: var(--card);
    border: 1px solid var(--border);
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .qa-card:hover { border-color: rgba(255,107,53,0.4); }
  .qa-card.revealed { border-color: rgba(0, 212, 255, 0.3); }

  .qa-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px 24px;
  }

  .q-num {
    font-size: 11px;
    color: var(--accent);
    min-width: 32px;
    padding-top: 2px;
    letter-spacing: 0.1em;
  }

  .q-meta { flex: 1; }

  .difficulty {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
    border: 1px solid;
  }

  .difficulty.hard { color: #ff4444; border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.08); }
  .difficulty.medium { color: #f59e0b; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
  .difficulty.expert { color: var(--accent3); border-color: rgba(168,85,247,0.3); background: rgba(168,85,247,0.08); }

  .question {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
  }

  .reveal-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    margin-top: 2px;
  }

  .reveal-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .reveal-btn.shown { border-color: var(--accent2); color: var(--accent2); }

  .answer-block {
    display: none;
    padding: 0 24px 20px 72px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .answer-block.visible { display: block; }

  .answer-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
    padding-top: 16px;
    margin-bottom: 10px;
  }

  .answer-text {
    font-size: 13px;
    line-height: 1.8;
    color: #c8c8d8;
  }

  .answer-text strong { color: var(--accent); }

  .code-block {
    background: #0d0d15;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 12px;
    line-height: 1.7;
    color: #a8b5d0;
    overflow-x: auto;
    white-space: pre;
  }

  .tip-block {
    background: rgba(34, 197, 94, 0.06);
    border: 1px solid rgba(34, 197, 94, 0.2);
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--green);
  }

  .tip-block::before { content: '💡 PRO TIP: '; font-weight: 600; }

  /* Floating controls */
  .controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }

  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .ctrl-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .ctrl-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .ctrl-btn.primary:hover { background: #ff8855; }

  .section-divider {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 24px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  @media (max-width: 640px) {
    .answer-block { padding-left: 24px; }
    .controls { bottom: 12px; right: 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="tag">Interview Prep Kit</div>
    <h1>Senior Staff<br><span>iOS Developer</span></h1>
    <p class="subtitle">// 40 curated questions across 6 domains · with model answers</p>
    <div class="stats-row">
      <div class="stat"><span class="stat-num">40</span><span class="stat-label">Questions</span></div>
      <div class="stat"><span class="stat-num">6</span><span class="stat-label">Domains</span></div>
      <div class="stat"><span class="stat-num" id="revealCount">0</span><span class="stat-label">Reviewed</span></div>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-cat="all">All</button>
    <button class="tab" data-cat="swift">Swift & Language</button>
    <button class="tab" data-cat="architecture">Architecture</button>
    <button class="tab" data-cat="concurrency">Concurrency</button>
    <button class="tab" data-cat="performance">Performance</button>
    <button class="tab" data-cat="leadership">Leadership</button>
    <button class="tab" data-cat="system">System Design</button>
  </div>

  <div class="progress-label" id="progressLabel">Progress: 0 / 40 reviewed</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="qa-list" id="qaList"></div>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="collapseAll()">Collapse All</button>
  <button class="ctrl-btn primary" onclick="revealAll()">Reveal All</button>
</div>

<script>
const questions = [
  // ── SWIFT & LANGUAGE ─────────────────────────────────────────────────────────
  {
    cat: 'swift', difficulty: 'hard',
    q: 'Explain Swift\'s ownership model and the role of ARC. How do you prevent retain cycles?',
    a: `<strong>ARC (Automatic Reference Counting)</strong> automatically tracks and manages memory by counting strong references to class instances. When the count drops to zero, the object is deallocated.

<strong>Retain cycles</strong> occur when two objects hold strong references to each other, preventing deallocation. You break them with:`,
    code: `// Weak reference (optional, may become nil)
class ViewController: UIViewController {
    weak var delegate: MyDelegate?
}

// Unowned reference (non-optional, must outlive owner)
class Request {
    let session: URLSession
    unowned let manager: RequestManager
    init(session: URLSession, manager: RequestManager) {
        self.session = session
        self.manager = manager
    }
}

// Capture lists in closures
class ViewModel {
    var onUpdate: (() -> Void)?
    func setup() {
        onUpdate = { [weak self] in
            guard let self else { return }
            self.refresh()
        }
    }
}`,
    tip: 'At Staff level, mention Instruments → Leaks/Allocations to detect cycles, and Xcode\'s memory graph debugger.'
  },
  {
    cat: 'swift', difficulty: 'expert',
    q: 'How does Swift\'s type system handle protocol existentials vs generics? When do you choose each?',
    a: `<strong>Generics</strong> use static dispatch — the concrete type is resolved at compile-time, enabling optimizations like inlining and specialization. <strong>Protocol existentials</strong> (any Protocol) use dynamic dispatch via a witness table, adding indirection but allowing heterogeneous collections.

Swift 5.7 introduced <strong>any</strong> keyword to make existentials explicit, and <strong>some</strong> for opaque return types.`,
    code: `// Generic — prefer when callee can be specialized
func process<T: Drawable>(_ item: T) { item.draw() }

// Existential — use for heterogeneous storage
let shapes: [any Drawable] = [Circle(), Square()]

// Opaque return (some) — hides concrete type, keeps static dispatch
func makeView() -> some View { Text("Hello") }

// Primary associated types (Swift 5.7) — constrained existentials
func display(_ collection: any Collection<String>) { ... }`,
    tip: 'Existentials box value types onto the heap (inline buffer for ≤3 words). This is a common performance footgun — mention it.'
  },
  {
    cat: 'swift', difficulty: 'medium',
    q: 'What are property wrappers and how would you design a custom one for thread-safe access?',
    a: `Property wrappers encapsulate common storage patterns behind an attribute. They declare a <strong>wrappedValue</strong> and optionally a <strong>projectedValue</strong> (accessed via $).`,
    code: `@propertyWrapper
final class Atomic<T> {
    private var _value: T
    private let lock = NSLock()

    init(wrappedValue: T) { _value = wrappedValue }

    var wrappedValue: T {
        get { lock.withLock { _value } }
        set { lock.withLock { _value = newValue } }
    }
}

// Usage
class Counter {
    @Atomic var count = 0
}`,
    tip: 'Discuss when to prefer actors (Swift concurrency) over NSLock for new code. Show you know both paradigms.'
  },
  {
    cat: 'swift', difficulty: 'hard',
    q: 'Explain Swift macros (SE-0382). What problem do they solve and what are their limitations?',
    a: `Swift macros (introduced Swift 5.9) are compile-time code transformations. Unlike C macros, they are <strong>type-checked, hygienic, and testable</strong>. They come in two flavors:

• <strong>Freestanding</strong> (#stringify, #warning) — produce expressions or declarations
• <strong>Attached</strong> (@Observable, @Model) — augment existing declarations

They solve boilerplate (e.g., Codable conformance, Observable pattern) without runtime overhead.`,
    code: `// Attached macro example
@Observable class UserViewModel {
    var name = ""   // macro generates _$observationRegistrar + willSet/didSet hooks
    var age = 0
}

// The macro expands at compile time — inspect via:
// Product → Perform Action → Expand Macro`,
    tip: 'Mention that macros run in a sandboxed process (SwiftSyntax). Mention @Observable replaces ObservableObject+@Published for SwiftUI.'
  },
  {
    cat: 'swift', difficulty: 'hard',
    q: 'How do result builders work, and when is building your own DSL justified?',
    a: `<strong>Result builders</strong> (formerly function builders) transform a series of statements into a single value through a set of static build methods. SwiftUI\'s ViewBuilder is the canonical example.`,
    code: `@resultBuilder
struct HTMLBuilder {
    static func buildBlock(_ components: String...) -> String {
        components.joined(separator: "\n")
    }
    static func buildOptional(_ component: String?) -> String {
        component ?? ""
    }
    static func buildEither(first: String) -> String { first }
    static func buildEither(second: String) -> String { second }
}

func html(@HTMLBuilder _ content: () -> String) -> String {
    "<html>\(content())</html>"
}`,
    tip: 'At Staff level, the key insight is recognizing when DSLs improve readability vs. add cognitive overhead. Cite real examples: test DSLs, router builders.'
  },
  {
    cat: 'swift', difficulty: 'medium',
    q: 'Describe value semantics, copy-on-write (CoW), and when to prefer structs over classes.',
    a: `<strong>Value types</strong> (struct, enum, tuple) are copied on assignment — each instance is independent. <strong>Reference types</strong> (class, actor) share identity.

<strong>CoW</strong> defers the actual copy until mutation, avoiding expensive copies when values are only read. Swift's standard library types (Array, Dictionary, String) implement CoW via isKnownUniquelyReferenced.`,
    code: `// Custom CoW
struct SafeBuffer {
    private var storage: NSMutableData

    init() { storage = NSMutableData() }

    private mutating func ensureUnique() {
        if !isKnownUniquelyReferenced(&storage) {
            storage = storage.mutableCopy() as! NSMutableData
        }
    }

    mutating func append(_ byte: UInt8) {
        ensureUnique()
        storage.append([byte], length: 1)
    }
}`,
    tip: 'Prefer structs by default. Use classes for identity semantics, inheritance chains, or Objective-C interop.'
  },
  // ── ARCHITECTURE ─────────────────────────────────────────────────────────────
  {
    cat: 'architecture', difficulty: 'expert',
    q: 'Compare MVC, MVVM, TCA, and Clean Architecture for a large-scale iOS app. What do you choose and why?',
    a: `<strong>MVC</strong>: Apple's default. Simple but leads to Massive View Controllers in large codebases. The VC does too much.

<strong>MVVM</strong>: ViewModel handles presentation logic, testable without UI. Works well with Combine/SwiftUI. Weakness: no prescribed navigation layer.

<strong>TCA (The Composable Architecture)</strong>: Unidirectional data flow, composable reducers, built-in effects system. Excellent for state machines and testability. Learning curve is steep.

<strong>Clean Architecture</strong>: Enforces dependency inversion with distinct layers (Domain, Data, Presentation). Best for large teams where layer boundaries prevent coupling.

At Staff level, the right answer is pragmatic: match architecture to team size and app complexity. A startup should start MVVM; a 50-engineer codebase needs Clean Architecture boundaries with module-per-feature.`,
    tip: 'Emphasize dependency injection, protocol-based abstractions, and how you\'d enforce boundaries with Swift Package Manager modules.'
  },
  {
    cat: 'architecture', difficulty: 'hard',
    q: 'How do you architect navigation in a large SwiftUI app? Compare approaches.',
    a: `SwiftUI navigation has evolved significantly. Three main strategies:

<strong>1. NavigationStack + navigationDestination</strong> (iOS 16+): Type-safe, stack-based. Good for simple hierarchies.

<strong>2. Coordinator pattern</strong>: Separates navigation logic from views. Each feature module owns its Coordinator which owns its NavigationPath.

<strong>3. Router/DeepLink manager</strong>: Centralized state machine mapping app state → routes, enabling deep-linking and testability.`,
    code: `// Coordinator approach
@Observable class AppCoordinator {
    var path = NavigationPath()
    
    func push(_ route: AppRoute) {
        path.append(route)
    }
    func pop() { path.removeLast() }
}

enum AppRoute: Hashable {
    case detail(itemID: UUID)
    case settings
    case profile(userID: String)
}`,
    tip: 'Mention that deep-linking requires your navigation state to be fully serializable. This is a common oversight teams discover late.'
  },
  {
    cat: 'architecture', difficulty: 'hard',
    q: 'How do you structure an iOS codebase for a 20+ engineer team using SPM?',
    a: `A modular monorepo with Swift Package Manager. Organize packages by layer and feature:

<strong>Layer packages</strong>: CoreNetwork, CorePersistence, CoreUI, DesignSystem
<strong>Feature packages</strong>: FeatureHome, FeatureCheckout, FeatureAuth — each owns its own models, viewmodels, views, tests
<strong>App target</strong>: Only wires features together via DI

Benefits: parallel compilation, faster incremental builds, clear ownership, enforced boundaries (no cross-feature imports), reusable in extensions/widgets.`,
    tip: 'Mention XCRemoteSwiftPackageReference vs local packages, and how you\'d use .product(name:package:) to expose only public APIs. Also mention build time impact of dynamic vs static linking.'
  },
  {
    cat: 'architecture', difficulty: 'medium',
    q: 'Explain dependency injection in Swift. How do you implement a DI container without third-party libraries?',
    a: `DI decouples object creation from use, enabling testability and flexibility. In Swift, protocol-based DI is preferred.

A lightweight service locator / DI container:`,
    code: `// Protocol-based dependencies
protocol Analytics { func track(_ event: String) }
protocol NetworkClient { func get(_ url: URL) async throws -> Data }

// DI Container
final class ServiceLocator {
    static let shared = ServiceLocator()
    private var factories: [ObjectIdentifier: Any] = [:]

    func register<T>(_ type: T.Type, factory: @escaping () -> T) {
        factories[ObjectIdentifier(type)] = factory
    }

    func resolve<T>(_ type: T.Type) -> T {
        guard let factory = factories[ObjectIdentifier(type)] as? () -> T else {
            fatalError("No registration for \(type)")
        }
        return factory()
    }
}

// In tests: register mocks
// ServiceLocator.shared.register(Analytics.self) { MockAnalytics() }`,
    tip: 'At Staff level, discuss the tradeoffs: service locator hides dependencies (anti-pattern) vs explicit constructor injection. Prefer constructor injection; use containers only at the composition root.'
  },
  {
    cat: 'architecture', difficulty: 'hard',
    q: 'How do you design an offline-first iOS app with sync?',
    a: `Key principles: <strong>local is source of truth</strong>, changes are queued and synced opportunistically.

Architecture layers:
1. <strong>Local store</strong> (Core Data / SwiftData / SQLite) — all reads/writes go here first
2. <strong>Sync engine</strong> — observes local changes, diffs against server state, resolves conflicts
3. <strong>Conflict resolution</strong> — LWW (last-write-wins), CRDT, or custom merge strategies
4. <strong>Sync queue</strong> — persisted operation queue surviving app restarts
5. <strong>Network layer</strong> — monitors reachability, batches requests`,
    tip: 'Mention CloudKit / iCloud if applicable. Discuss tombstoning deleted records and idempotent server mutations (PUT vs POST). Conflict resolution is where candidates usually have gaps — go deep here.'
  },
  {
    cat: 'architecture', difficulty: 'expert',
    q: 'What patterns do you use to make SwiftUI views highly testable and previewable?',
    a: `Views should be <strong>pure functions of state</strong>. Extract all logic to ViewModels or domain objects.

Key patterns:
• <strong>Protocol-based dependencies</strong> injected into ViewModel
• <strong>Dependency inversion in previews</strong> via mock implementations
• <strong>ViewInspector</strong> for unit-testable view hierarchies
• <strong>Snapshot testing</strong> with swift-snapshot-testing`,
    code: `// Testable ViewModel
@Observable class FeedViewModel {
    private let service: any FeedService
    var items: [FeedItem] = []
    var state: LoadState = .idle

    init(service: any FeedService) {
        self.service = service
    }

    func load() async {
        state = .loading
        do {
            items = try await service.fetchItems()
            state = .loaded
        } catch { state = .failed(error) }
    }
}

// Preview with mock
#Preview {
    FeedView(viewModel: FeedViewModel(service: MockFeedService()))
}`,
    tip: 'Mention that @Observable (Swift 5.9) makes ViewModels easier to test than @ObservableObject because no Combine subscriptions to manage.'
  },
  // ── CONCURRENCY ──────────────────────────────────────────────────────────────
  {
    cat: 'concurrency', difficulty: 'expert',
    q: 'Explain Swift\'s actor model. How do actors prevent data races and what are their limitations?',
    a: `<strong>Actors</strong> are reference types with serial execution guarantees — only one task executes on the actor at a time. All stored properties are protected; external access requires <strong>await</strong> (async context).

<strong>@MainActor</strong> is a global actor bound to the main thread — annotate UI-related code.

Limitations:
• Actor reentrancy — suspension points (await) can allow other tasks to run, potentially mutating state
• No inheritance — actors cannot subclass
• Cross-actor calls are async even if the actor is idle`,
    code: `actor BankAccount {
    private var balance: Double = 0

    func deposit(_ amount: Double) {
        balance += amount
    }

    // Reentrancy risk — check after every await
    func transfer(amount: Double, to other: BankAccount) async throws {
        guard balance >= amount else { throw BankError.insufficient }
        balance -= amount
        await other.deposit(amount)
        // State may have changed since the check above!
    }
}`,
    tip: 'Discuss nonisolated methods (no actor protection needed, synchronous), and isolated parameters. Reentrancy is a frequent interview deep-dive.'
  },
  {
    cat: 'concurrency', difficulty: 'hard',
    q: 'What is structured concurrency and how do TaskGroup, async let, and Task differ?',
    a: `<strong>Structured concurrency</strong> means child tasks are scoped to their parent — cancellation propagates down, and the parent doesn't complete until all children do.

• <strong>async let</strong>: Spawn parallel child tasks inline; implicitly awaited at scope exit
• <strong>TaskGroup</strong>: Dynamic number of child tasks; collects results
• <strong>Task { }</strong>: Unstructured — escapes the current scope, manual lifecycle`,
    code: `// async let — parallel fetches
func loadDashboard() async throws -> Dashboard {
    async let user = fetchUser()
    async let feed = fetchFeed()
    async let notifications = fetchNotifications()
    return try await Dashboard(user: user, feed: feed, notifications: notifications)
}

// TaskGroup — dynamic
func fetchAll(ids: [UUID]) async throws -> [Item] {
    try await withThrowingTaskGroup(of: Item.self) { group in
        for id in ids { group.addTask { try await fetch(id) } }
        return try await group.reduce(into: []) { $0.append($1) }
    }
}`,
    tip: 'Explain that async let creates a child task immediately on declaration, even before the await. This is a common misconception.'
  },
  {
    cat: 'concurrency', difficulty: 'hard',
    q: 'How do you integrate Combine with async/await in legacy codebases?',
    a: `Use <strong>values</strong> property on Publishers (AsyncPublisher) or bridge with <strong>AsyncStream</strong>. Use <strong>withCheckedContinuation</strong> for one-shot Combine Publishers.`,
    code: `// Publisher → AsyncStream bridge
extension Publisher where Failure == Never {
    var asyncStream: AsyncStream<Output> {
        AsyncStream { continuation in
            let cancel = sink { _ in continuation.finish() }
                           receiveValue: { continuation.yield($0) }
            continuation.onTermination = { _ in cancel.cancel() }
        }
    }
}

// One-shot Publisher → async
func fetchOnce<P: Publisher>(_ publisher: P) async throws -> P.Output {
    try await withCheckedThrowingContinuation { continuation in
        var cancellable: AnyCancellable?
        cancellable = publisher.first().sink(
            receiveCompletion: { 
                if case .failure(let e) = $0 { continuation.resume(throwing: e) }
                cancellable = nil
            },
            receiveValue: { continuation.resume(returning: $0) }
        )
    }
}`,

let revealed = new Set();
let currentCat = 'all';

function filteredQuestions() {
  return currentCat === 'all' ? questions : questions.filter(q => q.cat === currentCat);
}

function updateProgress() {
  const total = filteredQuestions().length;
  const done = filteredQuestions().filter((_, i) => {
    const realIdx = questions.indexOf(filteredQuestions()[i]);
    return revealed.has(realIdx);
  }).length;
  const pct = total ? (done / total * 100).toFixed(0) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Progress: ${done} / ${total} reviewed`;
  document.getElementById('revealCount').textContent = revealed.size;
}

function renderCards() {
  const list = document.getElementById('qaList');
  list.innerHTML = '';
  const items = filteredQuestions();

  items.forEach((item, localIdx) => {
    const globalIdx = questions.indexOf(item);
    const num = String(localIdx + 1).padStart(2, '0');
    const isRevealed = revealed.has(globalIdx);

    const card = document.createElement('div');
    card.className = 'qa-card' + (isRevealed ? ' revealed' : '');
    card.dataset.idx = globalIdx;

    const codePart = item.code ? `<div class="code-block">${escapeHtml(item.code.trim())}</div>` : '';
    const tipPart = item.tip ? `<div class="tip-block">${item.tip}</div>` : '';

    card.innerHTML = `
      <div class="qa-header">
        <span class="q-num">${num}</span>
        <div class="q-meta">
          <span class="difficulty ${item.difficulty}">${item.difficulty}</span>
          <div class="question">${item.q}</div>
        </div>
        <button class="reveal-btn ${isRevealed ? 'shown' : ''}" onclick="toggleAnswer(${globalIdx}, this)">
          ${isRevealed ? 'Hide' : 'Answer'}
        </button>
      </div>
      <div class="answer-block ${isRevealed ? 'visible' : ''}">
        <div class="answer-label">▸ Model Answer</div>
        <div class="answer-text">${item.a}${codePart}${tipPart}</div>
      </div>
    `;
    list.appendChild(card);
  });
  updateProgress();
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toggleAnswer(globalIdx, btn) {
  const card = document.querySelector(`[data-idx="${globalIdx}"]`);
  const answer = card.querySelector('.answer-block');
  const isVisible = answer.classList.contains('visible');

  if (isVisible) {
    answer.classList.remove('visible');
    card.classList.remove('revealed');
    btn.textContent = 'Answer';
    btn.classList.remove('shown');
    revealed.delete(globalIdx);
  } else {
    answer.classList.add('visible');
    card.classList.add('revealed');
    btn.textContent = 'Hide';
    btn.classList.add('shown');
    revealed.add(globalIdx);
  }
  updateProgress();
}

function revealAll() {
  filteredQuestions().forEach(item => revealed.add(questions.indexOf(item)));
  renderCards();
}

function collapseAll() {
  filteredQuestions().forEach(item => revealed.delete(questions.indexOf(item)));
  renderCards();
}

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
  if (!e.target.matches('.tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;
  renderCards();
});

// Init
renderCards();
</script>
